name: daleelak
description: "دليلك — تطبيق الموبايل (Flutter WebView)"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0" # يتطلب Flutter 3.27 أو أحدث

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # عرض الموقع داخل التطبيق
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.0
  webview_flutter_wkwebview: ^3.18.0

  # كشف حالة الاتصال بالإنترنت (شاشة عدم الاتصال)
  connectivity_plus: ^7.1.1

  # طلب أذونات الموقع/الكاميرا/الميكروفون للموقع
  permission_handler: ^12.0.3

  # ── مزايا أصلية (لتجاوز قاعدة آبل 4.2) ──
  shared_preferences: ^2.3.2 # حفظ المفضّلة محلياً
  share_plus: ^12.0.2 # مشاركة التطبيق
  url_launcher: ^6.3.1 # تقييم/اتصال/خصوصية

dev_dependencies:
  flutter_lints: ^6.0.0

  # توليد أيقونة التطبيق وشاشة الإقلاع تلقائياً
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# ── إعداد شاشة الإقلاع الأصلية (تُولَّد بأمر flutter_native_splash) ──
flutter_native_splash:
  color: "#ffffff"
  android_12:
    color: "#ffffff"

# ── إعداد أيقونة التطبيق (تُولَّد بأمر flutter_launcher_icons) ──
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon.png"
