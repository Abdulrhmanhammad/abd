# بناء تطبيق دليلك (Flutter) على السحابة بدون امتلاك جهاز Mac.
# ارفع المشروع على GitHub/GitLab واربطه بـ Codemagic، ثم شغّل الـ workflow المناسب.
workflows:
  # ── أندرويد: ينتج APK + AAB (لا يحتاج Mac إطلاقاً) ──
  android-workflow:
    name: Daleelak Android
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Generate splash & icons
        script: |
          flutter pub run flutter_native_splash:create
          flutter pub run flutter_launcher_icons
      - name: Build APK
        script: flutter build apk --release
      - name: Build App Bundle (للنشر على Google Play)
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab

  # ── iOS: يبنى على أجهزة Mac سحابية تابعة لـ Codemagic ──
  # يتطلب ربط حساب Apple Developer داخل Codemagic (Integrations > App Store Connect)
  # ثم تفعيل التوقيع التلقائي (Automatic code signing) في إعدادات الـ workflow.
  ios-workflow:
    name: Daleelak iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Generate splash & icons
        script: |
          flutter pub run flutter_native_splash:create
          flutter pub run flutter_launcher_icons
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build IPA
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
